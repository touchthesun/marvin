<!DOCTYPE html>
<html>
<head>
    <title>Chat with Marvin</title>
    <style>
        #chat {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            background-color: #f1f1f1;
            border-radius: 5px;
        }
        #inputArea {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h3>Chat with Marvin</h3>
    <ul id="chat"></ul>
    <div id="inputArea">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button id="sendBtn">Send</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
